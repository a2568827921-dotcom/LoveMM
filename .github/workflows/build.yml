name: Build EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install PyInstaller
      run: pip install pyinstaller

    - name: Build EXE
      run: pyinstaller --onefile --windowed LoveMM.py

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: LoveMM-exe
        path: dist/LoveMM.exe
